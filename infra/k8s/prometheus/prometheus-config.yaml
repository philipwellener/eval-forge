apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: evalforge
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: "evalforge-api"
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - evalforge
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            regex: evalforge-api
            action: keep
        static_configs:
          - targets:
              - "evalforge-api:8000"
        metrics_path: /metrics

      - job_name: "pushgateway"
        honor_labels: true
        static_configs:
          - targets:
              - "pushgateway:9091"
        metrics_path: /metrics
