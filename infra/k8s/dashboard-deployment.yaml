apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: evalforge
spec:
  type: NodePort
  ports:
    - name: https
      port: 443
      targetPort: 443
      nodePort: 30443
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
  selector:
    app: dashboard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: evalforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: evalforge-dashboard:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
            - containerPort: 443
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 100m
